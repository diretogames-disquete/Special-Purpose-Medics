<!DOCTYPE html>
<html lang="en" data-theme="tactical" data-accent="op">
<head>
  <meta charset="utf-8">
  <title>TCCC 360° — Tactical Casualty Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="TCCC 360° Tactical Casualty Dashboard — DD-1380 casualty card with injury map, live vitals, treatments, and a realistic drip & dosage calculator with teaching mode.">
  <meta name="color-scheme" content="dark light">

  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/webgl.css">
</head>
<body>
  <!-- WebGL ambient field (decorative; pointer-events disabled). Its colour
       tracks the casualty's acuity and reads through the glass chrome. -->
  <canvas id="webgl-bg" aria-hidden="true"></canvas>

  <div id="root"></div>

  <noscript>
    <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
                background:#0a0c0d;color:#9aa3a6;font:14px/1.5 system-ui,sans-serif;text-align:center;z-index:9999;padding:24px;">
      This dashboard requires JavaScript to display.
    </div>
  </noscript>

  <!-- Body-diagram image map + WebGL field -->
  <script src="js/resources.js"></script>
  <script src="js/webgl-background.js"></script>

  <!-- React + in-browser JSX transform -->
  <script src="js/vendor/react.development.js"></script>
  <script src="js/vendor/react-dom.development.js"></script>
  <script src="js/vendor/babel.min.js"></script>

  <!-- Components (JSX, transformed by Babel in load order) -->
  <script type="text/babel" data-presets="react" src="js/components/tweaks-panel.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/body-diagram.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/vitals-panel.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/treatments.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/drip-dosage.jsx"></script>
  <script type="text/babel" data-presets="react" src="js/components/app.jsx"></script>
</body>
</html>
