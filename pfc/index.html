<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Special-Purpose-Medic_direct</title>
  <!-- Dense desktop layout: on phones, render the full design width and let the
       browser scale it to fit (pinch-zoomable) rather than crushing it. Desktop
       browsers ignore viewport width, so they are unaffected. -->
  <meta name="viewport" content="width=1320, viewport-fit=cover">
  <meta name="description" content="PFC · Prolonged Casualty Care scenario monitor and documentation dashboard — 23 interactive Special-Purpose-Medics training scenarios.">
  <meta name="color-scheme" content="dark light">

  <!-- Visual system: self-hosted fonts, dashboard chrome, WebGL ambient layer -->
  <link rel="stylesheet" href="css/fonts.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/webgl.css">
</head>
<body>
  <!-- High-end WebGL ambient background. Purely decorative; pointer-events
       are disabled in CSS so it never intercepts dashboard interaction. -->
  <canvas id="webgl-bg" aria-hidden="true"></canvas>

  <noscript>
    <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
                background:#07090a;color:#9aa3a6;font:14px/1.5 system-ui,sans-serif;text-align:center;z-index:9999;padding:24px;">
      This dashboard requires JavaScript to display.
    </div>
  </noscript>

  <!-- React mount point -->
  <div id="root"></div>

  <!-- ── Vendor runtime (React + in-browser JSX transform) ───────────── -->
  <script src="js/vendor/react.development.js"></script>
  <script src="js/vendor/react-dom.development.js"></script>
  <script src="js/vendor/babel.min.js"></script>

  <!-- ── Decorative WebGL background (plain JS, runs immediately) ─────── -->
  <script src="js/webgl-background.js"></script>

  <!-- ── Application data + audio engine (plain globals) ─────────────── -->
  <script src="js/data/scenarios.js"></script>
  <script src="js/data/decision-points.js"></script>
  <script src="js/sound.js"></script>

  <!-- ── React components (JSX, transformed by Babel in load order) ──── -->
  <script type="text/babel" src="js/components/tweaks-panel.jsx"></script>
  <script type="text/babel" src="js/components/core.jsx"></script>
  <script type="text/babel" src="js/components/ecg.jsx"></script>
  <script type="text/babel" src="js/components/hero.jsx"></script>
  <script type="text/babel" src="js/components/right-panel.jsx"></script>
  <script type="text/babel" src="js/components/docs.jsx"></script>
  <script type="text/babel" src="js/components/tweaks-ui.jsx"></script>
  <script type="text/babel" src="js/components/app.jsx"></script>
</body>
</html>
